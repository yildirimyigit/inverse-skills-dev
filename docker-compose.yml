services:
  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        NEW_MAMBA_USER_ID: "${LOCAL_UID:-1000}"
        NEW_MAMBA_USER_GID: "${LOCAL_GID:-1000}"
    image: inverse-skills-dev:latest
    container_name: inverse-skills-dev
    working_dir: /workspace/inverse-skills-dev
    stdin_open: true
    tty: true
    shm_size: "16gb"
    volumes:
      - ./:/workspace/inverse-skills-dev
      - inverse-skills-micromamba:/opt/conda/pkgs
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /workspace/inverse-skills-dev/src
      PROJECT_ROOT: /workspace/inverse-skills-dev
      HOME: /tmp/mamba-home
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: sleep infinity

volumes:
  inverse-skills-micromamba:
